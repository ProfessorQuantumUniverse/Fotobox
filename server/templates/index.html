<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotobox</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Idle screen -->
  <div id="screen-idle" class="screen active">
    <div class="idle-content">
      <h1>📸 Fotobox</h1>
      <p id="trigger-btn" class="hint pulse" style="cursor: pointer; user-select: none;">Drücke den Button oder tippe hier!</p>
    </div>
  </div>

  <!-- Countdown screen -->
  <div id="screen-countdown" class="screen">
    <div class="countdown-content">
      <p class="countdown-text">Achtung …</p>
      <div id="countdown-dots" class="dots"></div>
    </div>
  </div>

  <!-- Review screen (show captured photo + action buttons) -->
  <div id="screen-review" class="screen">
    <div class="review-content">
      <img id="review-photo" src="" alt="Dein Foto" />
      <div class="review-buttons">
        <button id="btn-more-photos" class="btn btn-secondary">📷 Mehr Fotos</button>
        <button id="btn-done" class="btn btn-primary">✅ Fertig</button>
      </div>
    </div>
  </div>

  <!-- QR code screen -->
  <div id="screen-qr" class="screen">
    <div class="qr-content">
      <h2>📡 Fotos herunterladen</h2>
      <p class="qr-instruction">1) WLAN per QR verbinden</p>
      <img id="qr-code-img" src="" alt="WiFi QR Code" />
      <p class="qr-instruction">2) Download-Webseite per QR öffnen</p>
      <img id="qr-download-img" src="" alt="Download URL QR Code" />
      <div class="qr-credentials">
        <p><span class="qr-label">WLAN:</span> <span id="qr-ssid"></span></p>
        <p><span class="qr-label">Passwort:</span> <span id="qr-password"></span></p>
        <p><span class="qr-label">URL:</span> <span id="qr-url"></span></p>
      </div>
      <button id="btn-new-session" class="btn btn-primary">🔄 Neue Session</button>
    </div>
  </div>

  <!-- Error overlay -->
  <div id="screen-error" class="screen">
    <div class="error-content">
      <p>⚠️ Fehler bei der Aufnahme</p>
      <p id="error-message"></p>
    </div>
  </div>

  <script>
    const REVIEW_SECONDS = {{ review_seconds }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
